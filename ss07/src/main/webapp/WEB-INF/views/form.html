<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form ADD</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<form th:action="@{/handle-add}" method="post" th:object="${student}">
    <!-- Trường dành cho id -->
    <!-- Trong th:field có các thuộc tính id , name, value -->
    <div class="form-group">
        <label>ID</label>
        <input type="text" class="form-control" th:disabled="*{id != null} ? true : false" th:field="*{id}" aria-describedby="helpId" placeholder="">
    </div>
    <!-- Trường dành cho fullName -->
    <div class="form-group">
        <label for="">FullName</label>
        <input type="text" class="form-control" th:field="*{fullName}" aria-describedby="helpId" placeholder="">
    </div>
    <!-- Trường dành cho age -->
    <div class="form-group">
        <label for="">Age</label>
        <input type="number" class="form-control" th:field="*{age}" aria-describedby="helpId" placeholder="">
    </div>
    <!-- Trường dành cho gender -->
    <div class="form-group">
        <label for="">Gender</label>
        <select class="form-control" th:field="*{gender}">
            <option value="MALE">MALE</option>
            <option value="FEMALE">FEMALE</option>
            <option value="OTHER">OTHER</option>
        </select>
    </div>
    
    <!-- submit -->
    <button type="submit" class="btn btn-primary">Submit</button>
</form>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
