<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>Danh sách lịch sử giao dịch</h1>

<div th:each=" t : ${histories} ">
    <p th:text="|ID: ${t.id}|"></p>
    <p th:text="|Sender: ${t.sender.name}|"></p>
    <p th:text="|Receiver: ${t.receiver.name}|"></p>
    <p th:text="|Amount: ${t.amount}|"></p>
    <p th:text="|Message: ${t.message}|"></p>
    <p th:text="|Date: ${t.transferDate}|"></p>
</div>

</body>
</html>
